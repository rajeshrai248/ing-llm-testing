choco install python# Nginx configuration for Broker Fee Comparator
# Place this file at: /etc/nginx/sites-available/broker-comparator
# Then enable it with: sudo ln -s /etc/nginx/sites-available/broker-comparator /etc/nginx/sites-enabled/

upstream api_backend {
    # IMPORTANT: Update this to your backend server address
    server localhost:8000;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    
    # Update this with your domain
    server_name rajeshrai248.uk www.rajeshrai248.uk;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    
    server_name rajeshrai248.uk www.rajeshrai248.uk;
    
    # SSL configuration - Update paths to your certificates
    ssl_certificate /etc/letsencrypt/live/rajeshrai248.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rajeshrai248.uk/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml;
    gzip_disable "msie6";

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Serve static files from dist directory
    root /home/ubuntu/broker-fee-comparator/dist;

    # Index file
    index index.html index.htm;

    # Serve index.html for all requests (for SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
    }

    # Cache static assets with long expiry
    location ~* \.(js|css)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location ~* \.(jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|otf)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # API proxy - All backend requests go through this
    location ~ ^/(api|cost-comparison-tables|financial-analysis|news|refresh-and-analyze|chat)(/|$) {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # CORS Headers - Allow your domain
        add_header 'Access-Control-Allow-Origin' 'https://rajeshrai248.uk' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        
        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            return 204;
        }
        
        # Timeouts
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        
        # Cache bypass for POST requests
        proxy_cache_bypass $request_method;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}
