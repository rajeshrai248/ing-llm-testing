        log_not_found off;
    }

    # Deny access to common sensitive files
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ \.env {
        deny all;
    }

    # Logging
    access_log /var/log/nginx/broker-comparator-access.log;
    error_log /var/log/nginx/broker-comparator-error.log;

    # Performance optimizations
    client_max_body_size 20M;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;
}
